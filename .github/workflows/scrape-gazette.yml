name: Scrape Kenya Gazette for holiday declarations

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pypdf

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated holidays.json
        run: |
          git config user.name "holike-bot"
          git config user.email "bot@users.noreply.github.com"
          git add holidays.json scraper_state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update holidays.json [skip ci]"
            git push
          fi
